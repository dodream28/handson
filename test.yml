apiVersion: v1
kind: Pod
metadata:
  name: test
  labels:
    app: test
spec:
  containers:
  - name: nginx
    image: k8sk8stest.azurecr.io/challingedev:91
    ports:
    - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: test-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
  selector:
    app: test
